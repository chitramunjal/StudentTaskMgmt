{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto; margin-top: 5rem;">
    <h2 style="text-align: center;">Login</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit" style="width: 100%; margin-top: 1rem;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: #6b7280;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 500;">Register</a>
    </p>
</div>
{% endblock %}
