{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 6rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@university.edu" required>
            </div>
            <div class="form-group">
                <label>Security Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Authenticate</button>
        </form>
        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            New to the Cloud Hub? <a href="{{ url_for('register') }}" style="color: var(--primary-light); font-weight: 600; text-decoration: none;">Create secure account</a>
        </div>
    </div>
</div>
{% endblock %}
