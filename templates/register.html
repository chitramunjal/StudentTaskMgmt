{% extends 'base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 0.5rem;">Join the Hub</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Access your tasks & notes across any cloud instance.</p>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label>Full Student Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>University Email</label>
                <input type="email" name="email" placeholder="student@edu.com" required>
            </div>
            <div class="form-group">
                <label>Create Strong Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Initialize Account</button>
        </form>
        
        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Already registered? <a href="{{ url_for('login') }}" style="color: var(--primary-light); font-weight: 600; text-decoration: none;">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
